<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam Moçambique - Visualizador PDF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #004d26;
            --gold: #c5a021;
            --light: #f9f9f9;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #525659; /* Cor padrão de fundo de leitores de PDF */
        }

        header {
            background: var(--primary);
            color: white;
            padding: 12px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--gold);
            z-index: 10;
        }

        .content-area {
            flex: 1;
            width: 100%;
            height: 100%;
        }

        /* Iframe para exibir o PDF do Drive */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .btn-whatsapp {
            background: #25d366;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
        }

        h2 { margin: 0; font-size: 1.2rem; }
        small { color: #ccc; }
    </style>
</head>
<body>

    <header>
        <div>
            <h2>Islam Moçambique</h2>
            <small>Biblioteca Digital</small>
        </div>
        <a href="https://wa.me/258860407269" class="btn-whatsapp" target="_blank">
            <i class="fab fa-whatsapp"></i> Suporte
        </a>
    </header>

    <main class="content-area">
        <iframe src="https://drive.google.com/file/d/1kfs1IGAXZq6gJKyqIKuN5NqAA7BhpAVs/preview" allow="autoplay"></iframe>
    </main>

</body>
</html>
