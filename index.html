<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam Moçambique - Aulas de Madrassa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #006633; /* Verde Islâmico */
            --secondary-color: #d4af37; /* Dourado */
            --light-bg: #f4f7f6;
            --dark-text: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-bg);
            color: var(--dark-text);
            line-height: 1.6;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1rem;
            text-align: center;
            border-bottom: 4px solid var(--secondary-color);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .intro-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 2rem;
            text-align: center;
        }

        .lesson-section {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .lesson-header {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .lesson-header i {
            font-size: 1.5rem;
            margin-right: 10px;
        }

        /* Contentor para o PDF */
        .pdf-viewer {
            width: 100%;
            height: 800px; /* Altura ideal para leitura */
            border: 2px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Botão WhatsApp Flutuante */
        .whatsapp-float {
            position: fixed;
            width: 60px;
            height: 60px;
            bottom: 40px;
            right: 40px;
            background-color: #25d366;
            color: #FFF;
            border-radius: 50px;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 3px #999;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            color: white;
        }

        footer {
            text-align: center;
            padding: 2rem;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 600px) {
            .pdf-viewer {
                height: 500px;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Islam Moçambique</h1>
        <p>Centro de Aprendizagem e Ensino Alcorânico</p>
    </header>

    <div class="container">
        <div class="intro-card">
            <h2>Bem-vindo à sua Madrassa Digital</h2>
            <p>Abaixo, poderá acompanhar as lições do <strong>Yassarnal Qur'aan (Parte 1)</strong> de forma organizada e simples.</p>
        </div>

        <section class="lesson-section">
            <div class="lesson-header">
                <i class="fas fa-book-open"></i>
                <h3>Manual de Aula: Yassarnal Qur'aan</h3>
            </div>
            
            <div class="pdf-viewer">
                <iframe src="Yassarna 1ª Parte.pdf#toolbar=0" type="application/pdf">
                    <p>O seu navegador não suporta a visualização de PDFs. 
                    <a href="Yassarna 1ª Parte.pdf">Clique aqui para descarregar o PDF.</a></p>
                </iframe>
            </div>
        </section>
    </div>

    <a href="https://wa.me/258860407269?text=Assalamu+Alaikum%2C+gostaria+de+saber+mais+sobre+as+aulas+da+Madrassa" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <footer>
        <p>&copy; 2026 Islam Moçambique. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
