<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madrassa Online</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&family=Noto+Naskh+Arabic&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Rajdhani',sans-serif;
    background:#0a0a0f;
    color:#fff;
}

/* HEADER */
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:#111;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

.logo{
    font-family:'Orbitron';
    font-size:1.5rem;
    color:#00f5ff;
}

nav ul{
    display:flex;
    list-style:none;
    gap:20px;
}

nav a{
    color:#fff;
    text-decoration:none;
}

.menu-toggle{
    display:none;
    font-size:1.8rem;
    cursor:pointer;
}

/* HERO */
.hero{
    margin-top:80px;
    text-align:center;
    padding:60px 20px;
}

.hero h1{
    font-family:'Orbitron';
    font-size:2.5rem;
}

.btn{
    margin-top:20px;
    padding:12px 25px;
    background:#00f5ff;
    border:none;
    border-radius:20px;
    cursor:pointer;
}

/* VIDEO */
.video-section{
    padding:20px;
}

.video-box{
    max-width:800px;
    margin:auto;
}

/* ALFABETO */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(100px,1fr));
    gap:15px;
    padding:20px;
    direction: rtl; /* IMPORTANTE */
}

.card{
    background:#111;
    padding:20px;
    text-align:center;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    background:#1a1a1a;
}

.ar{
    font-size:2rem;
    font-family:'Noto Naskh Arabic';
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    margin-top:40px;
    border-top:1px solid #333;
}

/* MOBILE */
@media(max-width:768px){
nav ul{
    position:absolute;
    top:60px;
    right:0;
    background:#111;
    flex-direction:column;
    width:200px;
    display:none;
}

nav ul.active{display:flex;}

.menu-toggle{display:block;}
}
</style>
</head>

<body>

<header>
<div class="logo">Madrassa</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav>
<ul>
<li><a href="#">Início</a></li>
<li><a href="#video">Aula</a></li>
<li><a href="#alfabeto">Alfabeto</a></li>
<li><a href="#contato">Contato</a></li>
</ul>
</nav>
</header>

<section class="hero">
<h1>Aprenda o Alcorão Online</h1>
<p>Educação islâmica simples, moderna e acessível</p>
<button class="btn">Começar</button>
</section>

<!-- VIDEO -->
<section class="video-section" id="video">
<h2 style="text-align:center">Aula em Vídeo</h2>

<div class="video-box">
<iframe 
src="https://drive.google.com/file/d/1k9CFZmEZTboyMPWm2heU-STSHVTgAz_g/preview"
width="100%" 
height="400"
allow="autoplay"
style="border-radius:10px;border:none;">
</iframe>
</div>
</section>

<!-- ALFABETO -->
<section id="alfabeto">
<h2 style="text-align:center">Alfabeto Árabe</h2>

<div class="grid" id="grid"></div>
</section>

<!-- CONTATO -->
<footer id="contato">
<h3>Contacto</h3>
<p>📱 WhatsApp / Chamadas: <strong>+258 860 407 269</strong></p>
<p>Disponível para suporte e inscrições</p>
</footer>

<script>
// MENU MOBILE
function toggleMenu(){
document.querySelector('nav ul').classList.toggle('active');
}

// ALFABETO OFICIAL
const letras=[
"ا","ب","ت","ث","ج","ح","خ","د","ذ","ر",
"ز","س","ش","ص","ض","ط","ظ","ع","غ","ف",
"ق","ك","ل","م","ن","ه","و","ي"
];

const grid=document.getElementById('grid');

// CRIAR LETRAS
letras.forEach(l=>{
let div=document.createElement('div');
div.className='card';
div.innerHTML=`<div class="ar">${l}</div>`;
div.onclick=(e)=>som(l,e.currentTarget);
grid.appendChild(div);
});

// SOM DAS LETRAS
function som(letra,el){
const u=new SpeechSynthesisUtterance(letra);
u.lang='ar-SA';
speechSynthesis.speak(u);

// destaque visual
document.querySelectorAll('.card').forEach(c=>c.style.border='none');
el.style.border='2px solid #00f5ff';
}
</script>

</body>
</html>
