<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam Moçambique - Comunicados</title>
    <style>
        :root { --primary: #004d26; --gold: #c5a021; }
        body { 
            margin: 0; font-family: 'Segoe UI', sans-serif; 
            background: #f4f4f4; display: flex; flex-direction: column; align-items: center; 
        }
        header { 
            width: 100%; background: var(--primary); color: white; 
            padding: 20px; text-align: center; border-bottom: 4px solid var(--gold); 
        }
        .texto-container {
            margin-top: 50px; width: 85%; max-width: 600px;
            background: white; padding: 30px; border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            line-height: 1.6; font-size: 1.2rem; color: #333;
            text-align: center; white-space: pre-wrap; /* Mantém as quebras de linha */
        }
        .data-atualizacao { font-size: 0.8rem; color: #888; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Islam Moçambique</h1>
        <p>Painel de Informações</p>
    </header>

    <div class="texto-container" id="conteudo-texto">
        Carregando informações...
    </div>

    <script>
        // O seu link formatado para extrair o texto da planilha
        const URL_PLANILHA = "https://docs.google.com/spreadsheets/d/1kfs1IGAXZq6gJKyqIKuN5NqAA7BhpAVs/export?format=csv";

        async function carregarTexto() {
            try {
                const resposta = await fetch(URL_PLANILHA);
                const csv = await resposta.text();
                
                // O CSV separa por vírgulas. 
                // Se o seu texto estiver apenas na primeira célula (A1), usamos:
                const linhas = csv.split('\n');
                const textoPrincipal = linhas[0]; // Lê a primeira linha da planilha

                document.getElementById('conteudo-texto').innerHTML = `
                    <div>${textoPrincipal}</div>
                    <div class="data-atualizacao">Atualizado via Nuvem</div>
                `;
            } catch (erro) {
                document.getElementById('conteudo-texto').innerText = "Erro ao carregar o ficheiro de texto.";
            }
        }

        carregarTexto();
    </script>

</body>
</html>
