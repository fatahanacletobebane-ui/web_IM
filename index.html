<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islam Moçambique - Plataforma de Ensino Online</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #0d5c3b;
            --primary-light: #1e7d53;
            --secondary: #d4af37;
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #2d3748;
            --text-light: #718096;
            --border: #e2e8f0;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #e53e3e;
            --whatsapp: #25D366;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
        }
        
        /* Layout Principal */
        .app-container {
            display: flex;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .sidebar {
            width: 280px;
            background: linear-gradient(180deg, var(--primary) 0%, #0a4a2e 100%);
            color: white;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            transition: transform 0.3s;
            z-index: 1000;
        }
        
        .sidebar-header {
            padding: 2rem;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        
        .sidebar-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        
        .sidebar-header p {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        
        .nav-menu {
            padding: 1.5rem 0;
        }
        
        .nav-item {
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            border-left-color: var(--secondary);
        }
        
        .nav-item i {
            font-size: 1.2rem;
            width: 24px;
        }
        
        .user-profile-sidebar {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 1.5rem;
            background: rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        
        .page-title h2 {
            font-size: 1.8rem;
            color: var(--primary);
        }
        
        .page-title p {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(13, 92, 59, 0.3);
        }
        
        .btn-whatsapp {
            background: var(--whatsapp);
            color: white;
        }
        
        .btn-whatsapp:hover {
            background: #128C7E;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: white;
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .btn-secondary:hover {
            background: var(--bg);
        }
        
        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--card);
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 1rem;
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .stat-icon.blue { background: #ebf8ff; color: #3182ce; }
        .stat-icon.green { background: #f0fff4; color: var(--success); }
        .stat-icon.orange { background: #fffaf0; color: var(--warning); }
        .stat-icon.purple { background: #faf5ff; color: #805ad5; }
        
        .stat-info h3 {
            font-size: 1.8rem;
            margin-bottom: 0.2rem;
        }
        
        .stat-info p {
            color: var(--text-light);
            font-size: 0.9rem;
        }
        
        /* Content Sections */
        .content-section {
            background: var(--card);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .section-title {
            font-size: 1.3rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        /* Lessons Grid */
        .lessons-container {
            display: grid;
            gap: 1rem;
        }
        
        .lesson-card {
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .lesson-card:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }
        
        .lesson-card.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, #f0fff4 0%, #ffffff 100%);
        }
        
        .lesson-card.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .lesson-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 1rem;
        }
        
        .lesson-number {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .lesson-status {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .status-completed { background: #c6f6d5; color: #22543d; }
        .status-progress { background: #feebc8; color: #744210; }
        .status-locked { background: #e2e8f0; color: #4a5568; }
        
        .lesson-content h4 {
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        
        .lesson-content p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 1rem;
        }
        
        .lesson-meta {
            display: flex;
            gap: 1rem;
            font-size: 0.85rem;
            color: var(--text-light);
        }
        
        .progress-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 1rem;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        /* Video Player Section */
        .video-section {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }
        
        .video-player {
            background: #000;
            border-radius: 12px;
            aspect-ratio: 16/9;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }
        
        .video-placeholder {
            text-align: center;
        }
        
        .video-placeholder p {
            font-size: 1rem;
            margin-top: 1rem;
        }
        
        .video-info {
            margin-top: 1.5rem;
        }
        
        .video-info h3 {
            margin-bottom: 0.5rem;
            color: var(--primary);
        }
        
        .video-sidebar {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .video-item {
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .video-item:hover, .video-item.active {
            background: var(--primary);
            color: white;
        }
        
        .video-thumb {
            width: 80px;
            height: 60px;
            background: rgba(0,0,0,0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .video-item-info h5 {
            font-size: 0.9rem;
            margin-bottom: 0.25rem;
        }
        
        .video-item-info span {
            font-size: 0.75rem;
            opacity: 0.8;
        }
        
        /* Assessment Section */
        .assessment-card {
            background: linear-gradient(135deg, #faf5ff 0%, #ffffff 100%);
            border: 2px solid #e9d8fd;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
        }
        
        .assessment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .assessment-score {
            text-align: center;
        }
        
        .score-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--success);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--success);
            margin: 0 auto 0.5rem;
        }
        
        .quiz-container {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-top: 1rem;
        }
        
        .quiz-question {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
            color: var(--text);
        }
        
        .quiz-options {
            display: grid;
            gap: 1rem;
        }
        
        .quiz-option {
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .quiz-option:hover {
            border-color: var(--primary);
            background: #f0fff4;
        }
        
        .quiz-option.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }
        
        .quiz-option.correct {
            border-color: var(--success);
            background: #f0fff4;
        }
        
        .quiz-option.wrong {
            border-color: var(--danger);
            background: #fff5f5;
        }
        
        .option-letter {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .quiz-option.selected .option-letter,
        .quiz-option.correct .option-letter,
        .quiz-option.wrong .option-letter {
            background: rgba(255,255,255,0.2);
        }
        
        /* Individual Assessment Table */
        .assessment-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        
        .assessment-table th,
        .assessment-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        
        .assessment-table th {
            background: var(--bg);
            font-weight: 600;
            color: var(--primary);
        }
        
        .assessment-table tr:hover {
            background: var(--bg);
        }
        
        .grade {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .grade-a { background: #c6f6d5; color: #22543d; }
        .grade-b { background: #bee3f8; color: #2a4365; }
        .grade-c { background: #feebc8; color: #744210; }
        .grade-d { background: #fed7d7; color: #742a2a; }
        
        /* Chat Interface */
        .chat-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
            height: 600px;
        }
        
        .chat-sidebar {
            background: var(--bg);
            border-radius: 12px;
            padding: 1rem;
            overflow-y: auto;
        }
        
        .chat-user {
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.5rem;
            transition: all 0.3s;
        }
        
        .chat-user:hover, .chat-user.active {
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .chat-user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .chat-user-info h5 {
            font-size: 0.9rem;
            margin-bottom: 0.2rem;
        }
        
        .chat-user-info span {
            font-size: 0.75rem;
            color: var(--text-light);
        }
        
        .chat-main {
            background: var(--card);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
        }
        
        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-messages {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            max-width: 70%;
            padding: 1rem;
            border-radius: 12px;
            position: relative;
        }
        
        .message.received {
            background: var(--bg);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message.sent {
            background: var(--primary);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message-time {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-top: 0.5rem;
        }
        
        .chat-input {
            padding: 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
        }
        
        .chat-input input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: inherit;
        }
        
        /* Teacher Dashboard Specific */
        .student-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        
        .student-card {
            background: var(--card);
            border-radius: 12px;
            padding: 1.5rem;
            border: 2px solid var(--border);
            transition: all 0.3s;
        }
        
        .student-card:hover {
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        
        .student-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        
        .student-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
        }
        
        .student-info h4 {
            margin-bottom: 0.2rem;
        }
        
        .student-info span {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        
        .student-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        
        .student-stat {
            text-align: center;
        }
        
        .student-stat h5 {
